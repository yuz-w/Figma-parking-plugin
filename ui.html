<style>
  body { font-family: sans-serif; padding: 16px; background-color: #f5f5f5; }
  h2 { margin: 0 0 14px; font-size: 14px; }
  .section { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
  .divider { display: flex; align-items: center; gap: 8px; margin: 4px 0 12px; color: #aaa; font-size: 12px; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #ddd; }
  input[type="file"] { padding: 10px; border: 2px dashed #ccc; border-radius: 8px; background: #fff; cursor: pointer; font-size: 12px; }
  .url-row { display: flex; gap: 6px; }
  .url-row input[type="text"] { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 8px; background: #fff; font-size: 12px; outline: none; }
  .url-row input[type="text"]:focus { border-color: #0D99FF; }
  .url-row button { width: auto; padding: 10px 14px; font-size: 12px; white-space: nowrap; }
  button { width: 100%; padding: 12px; background: #0D99FF; color: white; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; }
  button:disabled { background: #d3d3d3; cursor: not-allowed; }
  #statusMsg { font-size: 11px; color: #888; min-height: 16px; }
</style>

<h2>HTML → Figma 변환기 🧱</h2>

<div class="section">
  <input type="file" id="htmlFileInput" accept=".html">
</div>

<div class="divider">또는</div>

<div class="section">
  <div class="url-row">
    <input type="text" id="urlInput" placeholder="https://example.com">
    <button id="fetchBtn">불러오기</button>
  </div>
  <div id="statusMsg"></div>
</div>

<button id="drawBtn" disabled>피그마에 그리기</button>

<script>
  let htmlContent = "";

  const drawBtn   = document.getElementById('drawBtn');
  const statusMsg = document.getElementById('statusMsg');

  function setReady(msg) {
    drawBtn.disabled = false;
    statusMsg.textContent = msg || '';
  }

  // ── 파일 업로드 ──────────────────────────────────────────────────────────────
  document.getElementById('htmlFileInput').addEventListener('change', (e) => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      htmlContent = ev.target.result;
      setReady('✅ 파일 로드 완료');
    };
    reader.readAsText(e.target.files[0]);
  });

  // ── URL 불러오기 (code.js 경유 — UI CSP 우회) ──────────────────────────────
  document.getElementById('fetchBtn').addEventListener('click', () => {
    const url = document.getElementById('urlInput').value.trim();
    if (!url) return;

    statusMsg.textContent = '⏳ 불러오는 중...';
    drawBtn.disabled = true;

    // fetch는 UI iframe CSP에 막히므로 code.js 샌드박스에 위임
    parent.postMessage({ pluginMessage: { type: 'fetch-url', url: url } }, '*');
  });

  // ── code.js 응답 수신 ─────────────────────────────────────────────────────
  window.onmessage = (event) => {
    const msg = event.data.pluginMessage;
    if (!msg) return;

    if (msg.type === 'fetch-result') {
      if (msg.success) {
        htmlContent = msg.html;
        setReady(`✅ 로드 완료: ${msg.url.replace(/^https?:\/\//, '').slice(0, 40)}`);
      } else {
        statusMsg.textContent = '❌ 불러오기 실패 (CORS 차단 또는 네트워크 오류)';
      }
    }
  };

  // ── 색상 파싱 ──────────────────────────────────────────────────────────────
  function parseColor(str) {
    if (!str || str === 'rgba(0, 0, 0, 0)' || str === 'transparent') return null;
    const m = str.match(/[\d.]+/g);
    if (!m || m.length < 3) return null;
    return { r: m[0] / 255, g: m[1] / 255, b: m[2] / 255, a: m[3] != null ? parseFloat(m[3]) : 1 };
  }

  // ── box-shadow 파싱 ────────────────────────────────────────────────────────
  // getComputedStyle가 반환하는 형식: "rgba(0, 0, 0, 0.1) 0px 4px 12px 0px"
  function parseShadows(str) {
    if (!str || str === 'none') return [];
    const results = [];
    // 색상과 나머지를 분리
    const parts = str.split(/,(?![^()]*\))/); // rgba() 안의 콤마는 건너뜀
    for (const part of parts) {
      const s = part.trim();
      if (!s || s === 'none') continue;
      const colorMatch = s.match(/rgba?\([^)]+\)|#[0-9a-fA-F]+/);
      if (!colorMatch) continue;
      const color = parseColor(colorMatch[0]);
      if (!color) continue;
      const rest = s.replace(/rgba?\([^)]+\)|#[0-9a-fA-F]+/g, '').trim();
      const nums = rest.match(/-?[\d.]+/g) || [];
      const isInset = s.includes('inset');
      results.push({
        inset: isInset,
        x:      parseFloat(nums[0]) || 0,
        y:      parseFloat(nums[1]) || 0,
        blur:   parseFloat(nums[2]) || 0,
        spread: parseFloat(nums[3]) || 0,
        color:  color,
      });
    }
    return results;
  }

  // ── 픽셀값 파싱 ────────────────────────────────────────────────────────────
  function px(val) {
    const n = parseFloat(val);
    return isNaN(n) ? null : n;
  }

  document.getElementById('drawBtn').onclick = () => {
    const iframe = document.createElement('iframe');
    iframe.style.cssText = 'width:1440px;height:8000px;position:absolute;left:-9999px;top:0;border:none;visibility:hidden;';
    document.body.appendChild(iframe);

    const doc = iframe.contentWindow.document;
    doc.open(); doc.write(htmlContent); doc.close();

    setTimeout(() => {
      const win = iframe.contentWindow;

      function extractNode(node, parentLeft, parentTop) {
        // ── ELEMENT ──────────────────────────────────────────────────────────
        if (node.nodeType === Node.ELEMENT_NODE) {
          const tag = node.tagName.toLowerCase();
          if (['script', 'style', 'head', 'meta', 'title', 'noscript', 'template', 'link'].includes(tag)) return null;

          // SVG 통째로 처리
          if (tag === 'svg') {
            const rect = node.getBoundingClientRect();
            if (rect.width === 0 || rect.height === 0) return null;
            return { type: 'SVG', content: node.outerHTML, x: rect.left, y: rect.top, w: rect.width, h: rect.height };
          }

          const style = win.getComputedStyle(node);
          const rect  = node.getBoundingClientRect();
          if (rect.width === 0 || rect.height === 0) return null;

          // <img> 태그 → 캔버스로 base64 변환 시도
          if (tag === 'img' && node.src) {
            let imgData = null;
            try {
              const c = doc.createElement('canvas');
              c.width  = Math.round(rect.width);
              c.height = Math.round(rect.height);
              c.getContext('2d').drawImage(node, 0, 0, c.width, c.height);
              imgData = c.toDataURL('image/png');
            } catch (e) {}
            return {
              type: 'IMAGE', src: imgData,
              x: rect.left, y: rect.top, w: rect.width, h: rect.height,
              radius: parseInt(style.borderRadius) || 0,
            };
          }

          // 폰트 패밀리: 첫 번째 실제 폰트명 (시스템 폰트 별칭 제외)
          const rawFamilies = style.fontFamily.split(',').map(f => f.trim().replace(/['"]/g, ''));
          const SYSTEM_ALIASES = ['-apple-system', 'blinkmacsystemfont', 'system-ui', 'segoe ui', 'sans-serif', 'serif', 'monospace'];
          const resolvedFamily = rawFamilies.find(f => !SYSTEM_ALIASES.includes(f.toLowerCase())) || rawFamilies[0] || 'Inter';

          // 자식 재귀 (이 노드의 절대좌표를 parentLeft/Top으로 전달)
          const children = Array.from(node.childNodes)
            .map(child => extractNode(child, rect.left, rect.top))
            .filter(Boolean);

          return {
            type:        'FRAME',
            tag:         tag,
            x: rect.left, y: rect.top, w: rect.width, h: rect.height,
            // 배경 & 테두리
            bg:          parseColor(style.backgroundColor),
            border:      parseColor(style.borderColor),
            bw:          parseInt(style.borderWidth) || 0,
            radius:      parseFloat(style.borderRadius) || 0,
            // 효과
            shadows:     parseShadows(style.boxShadow),
            opacity:     parseFloat(style.opacity) || 1,
            overflow:    style.overflow,
            // 텍스트 스타일 (컨테이너에서 뽑아 TEXT 노드에 전달될 수도 있음)
            fontFamily:  resolvedFamily,
            fontSize:    parseInt(style.fontSize) || 16,
            fontWeight:  style.fontWeight,
            lineHeight:  style.lineHeight,   // px값으로 이미 계산됨
            letterSpacing: style.letterSpacing, // px값으로 이미 계산됨
            color:       parseColor(style.color),
            textAlign:   style.textAlign,
            // ── 오토레이아웃용 레이아웃 속성 ──────────────────────────────
            display:        style.display,
            flexDirection:  style.flexDirection,
            justifyContent: style.justifyContent,
            alignItems:     style.alignItems,
            flexWrap:       style.flexWrap,
            gap:            parseFloat(style.gap) || 0,
            rowGap:         parseFloat(style.rowGap) || 0,
            columnGap:      parseFloat(style.columnGap) || 0,
            paddingTop:     parseFloat(style.paddingTop) || 0,
            paddingRight:   parseFloat(style.paddingRight) || 0,
            paddingBottom:  parseFloat(style.paddingBottom) || 0,
            paddingLeft:    parseFloat(style.paddingLeft) || 0,
            flexGrow:       parseFloat(style.flexGrow) || 0,
            // 레이아웃 힌트 (절대좌표 배치이므로 참고용)
            children:    children,
          };
        }

        // ── TEXT NODE ─────────────────────────────────────────────────────────
        if (node.nodeType === Node.TEXT_NODE) {
          const text = node.textContent.replace(/\s+/g, ' ').trim();
          if (!text) return null;

          const parent = node.parentElement;
          const style  = win.getComputedStyle(parent);

          // p/li/td 등 블록 텍스트: 부모 컨테이너 너비 FILL (줄바꿈 허용)
          // 그 외 (h1-h6, span, a 등): HUG (WIDTH_AND_HEIGHT, 줄바꿈 없음)
          // closest()로 조상까지 체크 → span 안 p 텍스트도 정확히 감지
          const FILL_SELECTOR = 'p, li, td, th, dd, dt, blockquote';
          const isBlockText = !!parent.closest(FILL_SELECTOR) || text.length > 60;

          let x = parentLeft, y = parentTop, textW = 0, textH = 0;
          try {
            const range = doc.createRange();
            range.selectNode(node);
            const rect = range.getBoundingClientRect();
            if (rect.width > 0 && rect.height > 0) {
              x = rect.left; y = rect.top;
              textW = rect.width;
              textH = rect.height;
            }
          } catch (e) {}

          if (isBlockText) {
            // 부모 컨테이너 전체 너비 사용 → Figma에서 컨테이너에 꽉 참
            try {
              const pr = parent.getBoundingClientRect();
              textW = pr.width;
              x = pr.left;
            } catch(e) {}
          }

          // 폰트 패밀리
          const rawFamilies = style.fontFamily.split(',').map(f => f.trim().replace(/['"]/g, ''));
          const SYSTEM_ALIASES = ['-apple-system', 'blinkmacsystemfont', 'system-ui', 'segoe ui', 'sans-serif', 'serif', 'monospace'];
          const resolvedFamily = rawFamilies.find(f => !SYSTEM_ALIASES.includes(f.toLowerCase())) || rawFamilies[0] || 'Inter';

          return {
            type:          'TEXT',
            text:          text,
            x: x, y: y,
            w: textW,                                  // ← 텍스트 너비 (삐짐 방지)
            h: textH,                                  // ← 텍스트 높이
            fontSize:      parseInt(style.fontSize) || 16,
            fontWeight:    style.fontWeight,
            fontFamily:    resolvedFamily,
            fontStyle:     style.fontStyle,           // 'italic' / 'normal'
            lineHeight:    style.lineHeight,           // 이미 px 단위
            letterSpacing: style.letterSpacing,        // 이미 px 단위
            color:         parseColor(style.color) || { r: 0, g: 0, b: 0, a: 1 },
            textAlign:     style.textAlign,
            opacity:       parseFloat(style.opacity) || 1,
            textTransform: style.textTransform,
            isBlockText:   isBlockText,
          };
        }

        return null;
      }

      const data = extractNode(doc.body, 0, 0);
      parent.postMessage({ pluginMessage: { type: 'draw-html', data: data } }, '*');
      document.body.removeChild(iframe);
    }, 1500);
  };
</script>
